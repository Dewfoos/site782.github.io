<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Terminal</title>
<style>
body {
    margin: 0;
    background: black;
    color: #33ff33;
    font-family: monospace;
    overflow: hidden;
}

#screen {
    padding: 20px;
    height: 100vh;
    box-sizing: border-box;
    position: relative;
}

#output {
    white-space: pre-wrap;
    line-height: 1.4;
}

#input-line {
    display: flex;
    margin-top: 10px;
}

#prompt {
    margin-right: 8px;
}

#command {
    background: transparent;
    border: none;
    color: #33ff33;
    font-family: monospace;
    font-size: 1rem;
    outline: none;
    width: 100%;
}

.scanlines::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
}

.flicker {
    animation: flicker 0.12s infinite;
}

@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.96; }
    100% { opacity: 1; }
}
</style>
</head>
<body>
<div id="screen" class="scanlines flicker">
    <div id="output"></div>
    <div id="input-line">
        <span id="prompt">></span>
        <input id="command" autofocus />
    </div>
</div>

<script>
const output = document.getElementById("output");
const commandInput = document.getElementById("command");

const files = {
    help: `AVAILABLE COMMANDS:
HELP
DIR
OPEN LOG1
OPEN LOG2
CLEAR`,
    
    dir: `DIRECTORY:
LOG1.TXT
LOG2.TXT
SYSTEM_STATUS`,

    log1: `ENTRY 01:
Power fluctuation detected in lower maintenance corridor.
Cause unknown.`,

    log2: `ENTRY 02:
Audio recorded at 03:14 contains unidentified voice.
Transcript unavailable.`,

    system_status: `SYSTEM STATUS:
REACTOR: NOMINAL
SECURITY: PARTIAL FAILURE`
};

function print(text) {
    output.innerHTML += text + "\n";
    window.scrollTo(0, document.body.scrollHeight);
}

function bootSequence() {
    const boot = [
        "ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM",
        "COPYRIGHT 2075 ROBCO INDUSTRIES",
        "",
        "VAULT-TEC INTERNAL TERMINAL",
        "INITIALIZING..."
    ];

    let i = 0;
    const interval = setInterval(() => {
        if (i < boot.length) {
            print(boot[i]);
            i++;
        } else {
            clearInterval(interval);
            print("\nTYPE HELP");
        }
    }, 500);
}

commandInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const cmd = commandInput.value.trim().toLowerCase();
        print("> " + commandInput.value);

        if (cmd === "help") print(files.help);
        else if (cmd === "dir") print(files.dir);
        else if (cmd === "open log1") print(files.log1);
        else if (cmd === "open log2") print(files.log2);
        else if (cmd === "open system_status") print(files.system_status);
        else if (cmd === "clear") output.innerHTML = "";
        else print("COMMAND NOT RECOGNIZED");

        commandInput.value = "";
    }
});

bootSequence();
</script>
</body>
</html>
